user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  # LSP connection tickets are one-time bearer capabilities carried in the
  # WebSocket query. This format intentionally records $uri, never $request or
  # $args, so ingress access logs cannot retain the secret.
  log_format capability '$remote_addr [$time_local] '
                        '"$request_method $uri $server_protocol" '
                        '$status $body_bytes_sent "$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  resolver 127.0.0.11 valid=30s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Capability subdomains are an origin boundary, not frontend routes. The API
  # validates the exact configured base domain and Redis-backed capability
  # before dialing an allowlisted SandboxSession port. WebSocket upgrades keep
  # Vite/Next HMR on the same preview origin.
  server {
    # Unknown hosts fall into the capability handler, where the API rejects
    # anything that is not an exact live preview grant. The main UI below is
    # bound only to its configured local/public ingress names.
    listen 10000 default_server;
    # Route only the configured local/public preview zones here. The API then
    # validates the exact 48-character capability label, base domain, and port
    # before resolving the Redis-backed grant.
    server_name *.preview.localhost *.preview.localhost:10000
      *.preview.43.216.1.58.nip.io *.preview.43.216.1.58.nip.io:10000;
    client_max_body_size 32m;
    set $api_host api:8080;

    # Attempt-scoped Model Gateway traffic is reachable only on the API's
    # private container network. Preview origins must never proxy it.
    location ^~ /internal/ {
      return 404;
    }

    location ^~ /api/platform/internal/ {
      return 404;
    }

    # Capability-subdomain pages are never an LSP control-plane origin. Keep a
    # malformed or leaked ticket out of the ordinary query-bearing access log.
    location = /v1/sandbox-lsp {
      access_log /var/log/nginx/access.log capability;
      return 404;
    }

    location = /api/platform/v1/sandbox-lsp {
      access_log /var/log/nginx/access.log capability;
      return 404;
    }

    location / {
      proxy_pass http://$api_host;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 300s;
      proxy_buffering off;
    }
  }

  server {
    listen 10000;
    server_name localhost 127.0.0.1 43.216.1.58;
    client_max_body_size 32m;

    set $frontend_host frontend:3000;
    set $api_host api:8080;

    location = /nginx-health {
      access_log off;
      default_type text/plain;
      return 200 'ok\n';
    }

    location = /api/platform {
      return 308 /api/platform/;
    }

    # The browser/API ingress cannot be used as a Model Gateway relay. Agent
    # Runners call the API service directly over a dedicated internal network.
    location ^~ /internal/ {
      return 404;
    }

    location ^~ /api/platform/internal/ {
      return 404;
    }

    location = /v1/sandbox-lsp {
      access_log /var/log/nginx/access.log capability;
      return 404;
    }

    location = /api/platform/v1/sandbox-lsp {
      access_log /var/log/nginx/access.log capability;
      rewrite ^/api/platform(/.*)$ $1 break;
      proxy_pass http://$api_host;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 300s;
      proxy_buffering off;
    }

    location ^~ /api/platform/ {
      rewrite ^/api/platform(/.*)$ $1 break;
      proxy_pass http://$api_host;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 300s;
      proxy_buffering off;
    }

    location ^~ /published/ {
      proxy_pass http://$api_host;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location ^~ /health/ {
      proxy_pass http://$api_host;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://$frontend_host;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
