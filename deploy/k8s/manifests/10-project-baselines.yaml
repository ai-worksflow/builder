apiVersion: v1
kind: ResourceQuota
metadata: {name: project-quota, namespace: wf-p-a7f3c2}
spec:
  hard: &quota
    requests.cpu: "1"
    requests.memory: 512Mi
    limits.cpu: "2"
    limits.memory: 1Gi
    pods: "10"
    services: "10"
    configmaps: "10"
    secrets: "10"
    persistentvolumeclaims: "2"
    count/jobs.batch: "10"
---
apiVersion: v1
kind: LimitRange
metadata: {name: project-limits, namespace: wf-p-a7f3c2}
spec:
  limits: &limits
    - type: Container
      defaultRequest: {cpu: 50m, memory: 32Mi}
      default: {cpu: 250m, memory: 128Mi}
      max: {cpu: "1", memory: 512Mi}
---
apiVersion: v1
kind: ServiceAccount
metadata: {name: project-runtime, namespace: wf-p-a7f3c2}
automountServiceAccountToken: false
